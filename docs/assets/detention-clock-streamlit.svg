<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">DetentionClock Streamlit detention review screenshot</title>
  <desc id="desc">Stylized screenshot of a detention review board with KPI cards, charge chart, and detention table.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="0" y="0" width="1200" height="68" fill="#111827"/>
  <text x="36" y="43" fill="#f8fafc" font-family="Arial, sans-serif" font-size="28" font-weight="700">DetentionClock</text>
  <text x="278" y="43" fill="#d1d5db" font-family="Arial, sans-serif" font-size="16">Local-first detention review for transport control towers</text>

  <rect x="36" y="102" width="204" height="94" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="58" y="135" fill="#64748b" font-family="Arial, sans-serif" font-size="15">Total visits</text>
  <text x="58" y="174" fill="#111827" font-family="Arial, sans-serif" font-size="34" font-weight="700">6</text>

  <rect x="260" y="102" width="204" height="94" rx="8" fill="#ffffff" stroke="#fecaca"/>
  <text x="282" y="135" fill="#991b1b" font-family="Arial, sans-serif" font-size="15">Detention cases</text>
  <text x="282" y="174" fill="#dc2626" font-family="Arial, sans-serif" font-size="34" font-weight="700">3</text>

  <rect x="484" y="102" width="204" height="94" rx="8" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="506" y="135" fill="#475569" font-family="Arial, sans-serif" font-size="15">Missing exits</text>
  <text x="506" y="174" fill="#64748b" font-family="Arial, sans-serif" font-size="34" font-weight="700">1</text>

  <rect x="708" y="102" width="204" height="94" rx="8" fill="#ffffff" stroke="#fed7aa"/>
  <text x="730" y="135" fill="#9a3412" font-family="Arial, sans-serif" font-size="15">Chargeable minutes</text>
  <text x="730" y="174" fill="#ea580c" font-family="Arial, sans-serif" font-size="34" font-weight="700">225</text>

  <rect x="932" y="102" width="164" height="94" rx="8" fill="#ffffff" stroke="#bbf7d0"/>
  <text x="954" y="135" fill="#166534" font-family="Arial, sans-serif" font-size="15">Est. amount</text>
  <text x="954" y="174" fill="#15803d" font-family="Arial, sans-serif" font-size="34" font-weight="700">977</text>

  <rect x="36" y="232" width="1128" height="180" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="62" y="267" fill="#111827" font-family="Arial, sans-serif" font-size="19" font-weight="700">Estimated charge by customer</text>
  <rect x="100" y="330" width="230" height="44" fill="#dc2626"/>
  <rect x="100" y="374" width="94" height="32" fill="#ca8a04"/>
  <rect x="492" y="300" width="210" height="74" fill="#dc2626"/>
  <text x="100" y="395" fill="#475569" font-family="Arial, sans-serif" font-size="14">Acme Foods</text>
  <text x="492" y="395" fill="#475569" font-family="Arial, sans-serif" font-size="14">Gulf Retail</text>
  <text x="842" y="350" fill="#64748b" font-family="Arial, sans-serif" font-size="14">red = chargeable detention</text>
  <text x="842" y="375" fill="#64748b" font-family="Arial, sans-serif" font-size="14">amber = approaching free time</text>

  <rect x="36" y="446" width="1128" height="226" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <text x="62" y="482" fill="#111827" font-family="Arial, sans-serif" font-size="19" font-weight="700">Detention report</text>
  <rect x="62" y="506" width="1076" height="38" fill="#f1f5f9"/>
  <text x="82" y="531" fill="#334155" font-family="Arial, sans-serif" font-size="14" font-weight="700">Trip</text>
  <text x="210" y="531" fill="#334155" font-family="Arial, sans-serif" font-size="14" font-weight="700">Customer</text>
  <text x="410" y="531" fill="#334155" font-family="Arial, sans-serif" font-size="14" font-weight="700">Site</text>
  <text x="650" y="531" fill="#334155" font-family="Arial, sans-serif" font-size="14" font-weight="700">Chargeable</text>
  <text x="820" y="531" fill="#334155" font-family="Arial, sans-serif" font-size="14" font-weight="700">Amount</text>
  <text x="960" y="531" fill="#334155" font-family="Arial, sans-serif" font-size="14" font-weight="700">Status</text>
  <text x="82" y="574" fill="#111827" font-family="Arial, sans-serif" font-size="14">TRIP-4006</text>
  <text x="210" y="574" fill="#111827" font-family="Arial, sans-serif" font-size="14">Gulf Retail</text>
  <text x="410" y="574" fill="#111827" font-family="Arial, sans-serif" font-size="14">Dammam Carrier Yard</text>
  <text x="650" y="574" fill="#111827" font-family="Arial, sans-serif" font-size="14">160 min</text>
  <text x="820" y="574" fill="#111827" font-family="Arial, sans-serif" font-size="14">427 SAR</text>
  <rect x="960" y="554" width="100" height="28" rx="5" fill="#dc2626"/>
  <text x="978" y="573" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="700">DETENTION</text>
  <text x="82" y="622" fill="#111827" font-family="Arial, sans-serif" font-size="14">TRIP-4004</text>
  <text x="210" y="622" fill="#111827" font-family="Arial, sans-serif" font-size="14">Acme Foods</text>
  <text x="410" y="622" fill="#111827" font-family="Arial, sans-serif" font-size="14">Riyadh Dry Port</text>
  <text x="650" y="622" fill="#64748b" font-family="Arial, sans-serif" font-size="14">review</text>
  <text x="820" y="622" fill="#64748b" font-family="Arial, sans-serif" font-size="14">-</text>
  <rect x="960" y="602" width="112" height="28" rx="5" fill="#64748b"/>
  <text x="978" y="621" fill="#ffffff" font-family="Arial, sans-serif" font-size="13" font-weight="700">MISSING EXIT</text>
