<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">LaneLab Streamlit screenshot</title>
  <desc id="desc">A stylized LaneLab dashboard with lane baseline KPI cards, confidence chart, baseline table, and outlier panel.</desc>
  <rect width="1200" height="720" fill="#f8fafc"/>
  <rect x="0" y="0" width="250" height="720" fill="#0f172a"/>
