  <text x="348" y="632" font-family="Arial, sans-serif" font-size="12" fill="#0f172a">UP-1003</text>
  <text x="458" y="632" font-family="Arial, sans-serif" font-size="12" fill="#0f172a">DESTINATION ARRIVAL</text>
  <rect x="646" y="612" width="102" height="26" rx="5" fill="#ca8a04"/>
