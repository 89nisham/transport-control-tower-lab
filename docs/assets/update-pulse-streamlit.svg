  <text x="348" y="590" font-family="Arial, sans-serif" font-size="12" fill="#0f172a">UP-1002</text>
  <text x="458" y="590" font-family="Arial, sans-serif" font-size="12" fill="#0f172a">ORIGIN DEPARTURE</text>
  <rect x="646" y="570" width="110" height="26" rx="5" fill="#dc2626"/>
  <text x="662" y="588" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#ffffff">NEEDS REVIEW</text>
